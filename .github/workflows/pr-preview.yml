name: PR Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'Past Events/**'
      - 'Meetups/**'
      - 'website/**'

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build site
        run: npm run build
        working-directory: website
